name: Deploy Skynet Web Portal
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Dependencies
        run: |
          pip install flet
          
      - name: Build Web Version
        run: |
          flet build web --base-url /${{ github.event.repository.name }}/
          
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages # سيقوم بإنشاء فرع جديد للموقع تلقائياً
