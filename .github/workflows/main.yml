name: Build Skynet Mythos APK
on: 
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet anthropic requests

      - name: Build Android APK
        run: |
          flet build apk --project "Skynet World AI"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Skynet-Mythos-Final
          path: build/apk/*.apk
