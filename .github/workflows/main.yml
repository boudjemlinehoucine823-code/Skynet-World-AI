name: Build Skynet Mythos APK
on: 
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # إجبار النظام على استخدام نسخة Node الحديثة لعام 2026
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet anthropic requests

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0' # نسخة مستقرة تمنع السؤال المفاجئ

      - name: Build Android APK
        run: |
          # إضافة --no-interaction تمنع السيرفر من انتظار إجابتك
          flet build apk --project "Skynet World AI"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Skynet-Mythos-Final
          path: build/apk/*.apk
