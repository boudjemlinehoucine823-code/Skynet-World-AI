name: Build Skynet Mythos APK
on: 
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet anthropic requests

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          # استخدام نسخة محددة يمنع النظام من البحث عن تحديثات أثناء البناء
          flutter-version: '3.19.0' 

      - name: Build Android APK
        run: |
          # أمر "yes |" يقوم بالضغط على حرف y تلقائياً لكل الأسئلة
          yes | flet build apk --project "Skynet World AI"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Skynet-Mythos-Final
          path: build/apk/*.apk
